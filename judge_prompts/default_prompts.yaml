preamble: "You are an evaluator of feature labels within a neural network."
downstream_description: "You are given a source feature description and two downstream feature descriptions. One of these downstream features is strongly influenced by the source feature, while the other is weakly connected. Your task is to determine which downstream feature is strongly connected to the source feature based on the descriptions. Descriptions of related concepts are more likely to indicate a strong connection between features."
upstream_description: "You are given a target feature description and two upstream feature descriptions. One of these upstream features has a strong causal influence over the target feature, while the other has a weak connection. Your task is to determine which upstream feature is more likely to have a strong influence on the target feature based on the descriptions. Descriptions of related concepts are more likely to indicate a strong connection between features."
formatting_instructions: "Respond with exactly one character: {} or {}, corresponding to the better option. Do not include any punctuation, formatting, or explanations."
